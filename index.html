<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>응원노트 지원</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #252936;
      --muted: #666b78;
      --line: #e6dccf;
      --paper: #fffaf3;
      --accent: #c44545;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.65;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.12;
    }
    h2 {
      margin: 32px 0 8px;
      font-size: 1.15rem;
    }
    p, li {
      font-size: 1rem;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-weight: 800;
    }
    .muted {
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 700;
    }
    .links {
      display: grid;
      gap: 12px;
      margin: 28px 0;
      padding: 0;
      list-style: none;
    }
    .links a {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      text-decoration: none;
    }
    footer {
      margin-top: 44px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: .92rem;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">응원노트</p>
    <h1>야구 팬 다이어리 앱 지원</h1>
    <p class="muted">응원노트는 공식 KBO, 구단, 포털, 영상 플랫폼 앱이 아닌 개인 팬 기록장입니다.</p>

    <ul class="links">
      <li><a href="./support-ko.html">지원 페이지</a></li>
      <li><a href="./privacy-policy-ko.html">개인정보 처리방침</a></li>
    </ul>

    <h2>앱 범위</h2>
    <p>응원노트는 경기 날짜를 기준으로 나만의 야구 일기, 기분, 직관 여부, 사진과 파일 첨부를 기기에 저장하는 iPhone 앱입니다. 계정, 광고, 구매, 분석 SDK, 서버 동기화, YouTube 하이라이트 연결, 자동 하이라이트 매칭은 포함하지 않습니다.</p>

    <footer>
      <p>Last updated: 2026-06-28</p>
    </footer>
  </main>
</body>
</html>
